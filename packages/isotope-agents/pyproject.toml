[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "isotope-agents"
version = "0.1.3"
description = "Agent framework built on isotope-core — tools, TUI, sessions, RPC, presets"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "GhostComplex" },
]
keywords = ["ai", "agent", "llm", "tool-use", "coding-agent"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]

dependencies = [
    "isotope-core[openai]>=0.1.3",
    "httpx>=0.27",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
tui = ["prompt-toolkit>=3.0", "rich>=13.0"]
mcp = ["mcp>=1.0"]
all = ["isotope-agents[tui,mcp]"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
]

[project.scripts]
isotope = "isotope_agents.cli:main"

[project.urls]
Homepage = "https://github.com/GhostComplex/isotope"
Repository = "https://github.com/GhostComplex/isotope"
Issues = "https://github.com/GhostComplex/isotope/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/isotope_agents"]
