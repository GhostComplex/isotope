name: Publish isotope-agent to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'agent-v')

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Build isotope-agent
        run: uv build --package isotope-agent --out-dir dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-agent
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'agent-v')
    environment: pypi

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-agent
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
